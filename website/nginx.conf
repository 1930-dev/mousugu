# Static serving for the Astro build (build.format: 'file').
# TLS terminates at Cloudflare; this container only ever sees HTTP.

# www is a 301 to the apex — one canonical host, no duplicate content.
server {
    listen 80;
    server_name www.mousugu.app;
    return 301 https://mousugu.app$request_uri;
}

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    error_page 404 /404.html;

    # /changelog -> changelog.html, /es -> es.html
    location / {
        try_files $uri $uri.html $uri/index.html =404;
        add_header Cache-Control "public, max-age=600" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Sparkle polls this; keep it fresh but cacheable.
    location = /appcast.xml {
        types { } default_type application/rss+xml;
        add_header Cache-Control "public, max-age=300";
    }

    location ~* \.(png|jpg|jpeg|webp|avif|svg|ico|woff2)$ {
        add_header Cache-Control "public, max-age=604800";
    }

    gzip on;
    gzip_types text/html text/css application/xml application/rss+xml text/plain image/svg+xml;
}
