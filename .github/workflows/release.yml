name: Release (DMG · Developer ID)

# Direct/DMG channel: build → Developer ID sign → notarize → staple → DMG →
# Sparkle appcast → GitHub Release. Triggered by a version tag. The Mac App
# Store channel is separate (release-appstore.sh).
#
# Tag must match the app's MARKETING_VERSION (e.g. tag v1.2.3 ↔ version 1.2.3).
# Secrets live in the repo's GitHub Secrets (loaded from Infisical /menubarcalendar).

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write        # create the Release + upload the DMG

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 45
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
      DEVELOPER_ID_CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
      DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
      SPARKLE_ED_KEY: ${{ secrets.SPARKLE_ED_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build · sign · notarize · package
        run: ./scripts/release-ci.sh

      - name: Locate DMG and verify version matches tag
        id: dmg
        run: |
          set -euo pipefail
          DMG=$(ls build/MouSugu-*.dmg | head -1)
          [ -n "$DMG" ] || { echo "::error::No DMG produced"; exit 1; }
          VER=$(basename "$DMG" .dmg | sed 's/^MouSugu-//')
          if [ "v$VER" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} != app MARKETING_VERSION ($VER). Bump MARKETING_VERSION to ${GITHUB_REF_NAME#v} or retag."
            exit 1
          fi
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Idempotent: update the asset if a release for this tag already exists
          # (e.g. a re-run), otherwise create the release.
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${{ steps.dmg.outputs.dmg }}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              "${{ steps.dmg.outputs.dmg }}" \
              --title "Mou Sugu ${{ steps.dmg.outputs.version }}" \
              --generate-notes
          fi

      - name: Upload appcast as artifact
        uses: actions/upload-artifact@v4
        with:
          name: appcast
          path: website/appcast.xml

      - name: Summary
        run: |
          {
            echo "### Released ${GITHUB_REF_NAME}"
            echo "- Notarized, stapled DMG attached to the GitHub Release."
            echo "- **Next:** publish \`website/appcast.xml\` (see the *appcast* artifact) to mousugu.app so Sparkle advertises the update."
          } >> "$GITHUB_STEP_SUMMARY"
