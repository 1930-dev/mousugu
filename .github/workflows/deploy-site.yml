name: Deploy website

# Builds the Astro site and deploys it to Cloudflare Pages (project "mousugu",
# custom domain mousugu.app). Runs when anything under website/ changes.
#
# Secrets: CLOUDFLARE_API_TOKEN (Pages:Edit on The Wise Monkey account) and
# CLOUDFLARE_ACCOUNT_ID. The Pages project is created once by hand; this
# workflow only pushes new deployments.

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/dist --project-name=mousugu
          workingDirectory: .
